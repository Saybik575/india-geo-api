services:
  - type: web
    name: india-village-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: india-village-db
          property: connectionString
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: API_KEY
        sync: false

databases:
  - name: india-village-db
    plan: free
    databaseName: neondb
    preDeleteScript: DELETE FROM villages; DELETE FROM subdistricts; DELETE FROM districts; DELETE FROM states; DELETE FROM countries;
